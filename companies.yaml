  # === CURATED LISTS (GitHub) — broad new-grad SWE coverage ===================
  # ============================================================================
  # These pull from public, frequently-updated curated job lists. They surface
  # roles from companies whose ATS we don't otherwise have configured (often
  # using iCIMS, Workday with non-obvious tenants, or custom sites). The
  # cross-source dedupe in main.py drops duplicates with our direct ATS fetches.
  # No description body available — these jobs bypass the sponsorship filter.
