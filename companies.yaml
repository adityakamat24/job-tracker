# Edit this file to add/remove companies. Each entry needs an `ats` and the
# fields that ATS requires:
#   greenhouse / ashby / lever / workable / smartrecruiters  →  token
#   workday                                                  →  tenant + site (+ optional subdomain, default wd1)
#   github_list                                              →  repo (+ optional branch, default 'main')
#
# Hand-verify a token by hitting the public endpoint before committing:
#   greenhouse:       https://boards-api.greenhouse.io/v1/boards/<token>/jobs
#   ashby:            https://api.ashbyhq.com/posting-api/job-board/<token>
#   lever:            https://api.lever.co/v0/postings/<token>?mode=json
#   workable:         https://apply.workable.com/api/v1/widget/accounts/<token>
#   smartrecruiters:  https://api.smartrecruiters.com/v1/companies/<token>/postings
#   workday:          POST https://<tenant>.<subdomain>.myworkdayjobs.com/wday/cxs/<tenant>/<site>/jobs
#   github_list:      https://raw.githubusercontent.com/<repo>/<branch>/<path>
#
# Tier is used for sort order in the Discord digest and embed color
# (1 = blue, 2 = green, 3 = grey).

