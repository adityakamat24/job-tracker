name: poll

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      bootstrap:
        description: "Bootstrap mode (no notifications, mark all current jobs as already-notified)"
        type: boolean
        default: false

permissions:
  contents: write   # required to commit jobs.db back

concurrency:
  group: poll
  cancel-in-progress: false   # queue runs; never race two crons on the SQLite file

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Fetch + filter + notify
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          if [[ "${{ inputs.bootstrap }}" == "true" ]]; then
            python -m src.main --bootstrap
          else
            python -m src.main
          fi

      - name: Sync reactions
        if: ${{ inputs.bootstrap != 'true' }}
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: python -m src.sync_reactions

      - name: Commit state
        run: |
          git config user.name "job-tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add jobs.db
          if git diff --staged --quiet; then
            echo "no state changes to commit"
          else
            git commit -m "state: $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
            git push
          fi
